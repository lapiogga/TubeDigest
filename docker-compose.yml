version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tubedigest_postgres
    restart: always
    environment:
      POSTGRES_USER: tubedigest
      POSTGRES_PASSWORD: tubedigest_password
      POSTGRES_DB: tubedigest_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
